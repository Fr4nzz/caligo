<?xml version="1.0" encoding="UTF-8"?>
<!-- Language-neutral evidence network: specimen ↔ reference genome ↔ population samples ↔ environment ↔ research question. No accessions, coordinates, or data values. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;color:currentColor">
  <defs>
    <marker id="j6-end" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1l7 4-7 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Bidirectional links emphasize that records and interpretation inform one another. -->
  <g fill="none" stroke="currentColor" stroke-width="3" stroke-opacity=".42" stroke-linecap="round" marker-start="url(#j6-end)" marker-end="url(#j6-end)">
    <path d="M204 240h92"/><path d="M454 240h92"/><path d="M704 240h92"/><path d="M954 240h92"/>
  </g>

  <!-- Specimen. -->
  <g transform="translate(125 240)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle r="79" stroke-width="3" stroke-opacity=".2"/>
    <path d="M0-50v100" stroke-width="3.5" stroke-opacity=".82"/>
    <circle cy="-37" r="7" fill="currentColor" fill-opacity=".72" stroke="none"/>
    <path d="M-4-23c-25-32-55-20-45 12 7 21 27 23 45 10M4-23c25-32 55-20 45 12-7 21-27 23-45 10M-3 5c-19 2-32 17-25 33 8 17 26 10 29-5M3 5c19 2 32 17 25 33-8 17-26 10-29-5" stroke-width="3.5" stroke-opacity=".82"/>
  </g>

  <!-- Reference genome. -->
  <g transform="translate(375 240)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle r="79" stroke-width="3" stroke-opacity=".2"/>
    <rect x="-47" y="-55" width="94" height="110" rx="12" stroke-width="3.5" stroke-opacity=".8"/>
    <path d="M-25-36c42 20 42 52 0 72M25-36c-42 20-42 52 0 72M-16-28h32M-25-12h50M-25 6h50M-19 24h38" stroke-width="3" stroke-opacity=".66"/>
  </g>

  <!-- Population samples. -->
  <g transform="translate(625 240)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle r="79" stroke-width="3" stroke-opacity=".2"/>
    <circle cx="0" cy="-30" r="19" stroke-width="3.5" stroke-opacity=".8"/>
    <circle cx="-34" cy="25" r="19" stroke-width="3.5" stroke-opacity=".8"/>
    <circle cx="34" cy="25" r="19" stroke-width="3.5" stroke-opacity=".8"/>
    <path d="M-10-13l-14 20M10-13L24 7M-15 25h30" stroke-width="3" stroke-opacity=".42" stroke-dasharray="3 7"/>
    <circle cy="-30" r="5" fill="currentColor" fill-opacity=".5" stroke="none"/><circle cx="-34" cy="25" r="5" fill="currentColor" fill-opacity=".5" stroke="none"/><circle cx="34" cy="25" r="5" fill="currentColor" fill-opacity=".5" stroke="none"/>
  </g>

  <!-- Environment: sun, leaf, and waterline. -->
  <g transform="translate(875 240)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle r="79" stroke-width="3" stroke-opacity=".2"/>
    <circle cx="30" cy="-32" r="14" stroke-width="3" stroke-opacity=".72"/>
    <path d="M30-55v-9M30-9v9M7-32h-9M53-32h9M14-48l-7-7M46-16l7 7M46-48l7-7" stroke-width="3" stroke-opacity=".52"/>
    <path d="M-47 19c8-44 47-57 68-51-1 32-19 60-59 59M-39 20C-17 3-3-9 18-28" stroke-width="3.5" stroke-opacity=".82"/>
    <path d="M-49 47c13-9 26 9 39 0s26 9 39 0 26 9 39 0" stroke-width="3" stroke-opacity=".5"/>
  </g>

  <!-- Research question: open lens and converging evidence paths. -->
  <g transform="translate(1125 240)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle r="79" stroke-width="3" stroke-opacity=".2"/>
    <circle cx="-10" cy="-10" r="37" stroke-width="4" stroke-opacity=".82"/>
    <path d="M17 17l34 34" stroke-width="7" stroke-opacity=".72"/>
    <path d="M-28-15l14 12 12-22M-28 12l18 8 18-13" stroke-width="3" stroke-opacity=".5"/>
    <circle cx="-28" cy="-15" r="4" fill="currentColor" fill-opacity=".55" stroke="none"/><circle cx="-2" cy="-25" r="4" fill="currentColor" fill-opacity=".55" stroke="none"/><circle cx="-28" cy="12" r="4" fill="currentColor" fill-opacity=".55" stroke="none"/><circle cx="8" cy="7" r="4" fill="currentColor" fill-opacity=".55" stroke="none"/>
  </g>
</svg>
