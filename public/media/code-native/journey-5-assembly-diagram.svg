<?xml version="1.0" encoding="UTF-8"?>
<!-- Language-neutral assembly schematic: reads → contigs → scaffolds → chromosome-scale sequence. No values shown; marks are illustrative only. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;color:currentColor">
  <defs>
    <marker id="j5-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M2 2l8 4-8 4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Forward process connectors. -->
  <g fill="none" stroke="currentColor" stroke-width="3" stroke-opacity=".42" stroke-linecap="round" marker-end="url(#j5-arrow)">
    <path d="M270 240h66"/><path d="M570 240h66"/><path d="M870 240h66"/>
  </g>

  <!-- Step markers use dots rather than language-specific labels. -->
  <g fill="currentColor" fill-opacity=".55">
    <circle cx="150" cy="94" r="5"/>
    <circle cx="440" cy="94" r="5"/><circle cx="460" cy="94" r="5"/>
    <circle cx="730" cy="94" r="5"/><circle cx="750" cy="94" r="5"/><circle cx="770" cy="94" r="5"/>
    <circle cx="1020" cy="94" r="5"/><circle cx="1040" cy="94" r="5"/><circle cx="1060" cy="94" r="5"/><circle cx="1080" cy="94" r="5"/>
  </g>

  <!-- Reads: overlapping short fragments. -->
  <g transform="translate(150 240)" fill="none" stroke="currentColor" stroke-linecap="round">
    <circle r="120" stroke-width="3" stroke-opacity=".18"/>
    <path d="M-72-66h64M14-66h48M-91-36h53M-21-36h77M-65-6h45M-2-6h88M-87 24h72M4 24h63M-61 54h39M-5 54h82" stroke-width="12" stroke-opacity=".72"/>
    <path d="M-8-66h22M-38-36h17M-20-6h18M-15 24H4M-22 54h17" stroke-width="3" stroke-opacity=".35"/>
  </g>

  <!-- Contigs: longer contiguous sequences assembled from overlaps. -->
  <g transform="translate(450 240)" fill="none" stroke="currentColor" stroke-linecap="round">
    <circle r="120" stroke-width="3" stroke-opacity=".18"/>
    <path d="M-88-58H61M-68-19H89M-91 20H48M-51 59H83" stroke-width="15" stroke-opacity=".74"/>
    <path d="M-48-66v16M7-66v16M-18-27v16M43-27v16M-57 12v16M-1 12v16M-15 51v16M39 51v16" stroke-width="3" stroke-opacity=".32"/>
  </g>

  <!-- Scaffolds: ordered contigs separated by known gaps (dashed links). -->
  <g transform="translate(750 240)" fill="none" stroke="currentColor" stroke-linecap="round">
    <circle r="120" stroke-width="3" stroke-opacity=".18"/>
    <path d="M-92-50h57M-17-50h34M39-50h54M-77 0h31M-25 0h73M69 0h19M-91 50h72M3 50h24M48 50h40" stroke-width="16" stroke-opacity=".74"/>
    <path d="M-34-50h16M18-50h20M-45 0h19M49 0h19M-18 50H2M28 50h19" stroke-width="4" stroke-dasharray="4 6" stroke-opacity=".45"/>
    <path d="M-92-75h185M-92 75h180" stroke-width="2" stroke-opacity=".24"/>
  </g>

  <!-- Chromosome-scale sequence: one ordered, end-to-end scaffold with telomeric caps. -->
  <g transform="translate(1050 240)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle r="120" stroke-width="3" stroke-opacity=".18"/>
    <rect x="-92" y="-22" width="184" height="44" rx="22" fill="currentColor" fill-opacity=".1" stroke-width="4" stroke-opacity=".8"/>
    <path d="M-70 0h140" stroke-width="10" stroke-opacity=".72"/>
    <path d="M-48-15v30M-18-15v30M17-15v30M49-15v30" stroke-width="3" stroke-opacity=".4"/>
    <path d="M-78-32v64M78-32v64" stroke-width="4" stroke-opacity=".65"/>
    <path d="M-74-66c24-17 48 17 72 0s48 17 72 0M-74 66c24-17 48 17 72 0s48 17 72 0" stroke-width="3" stroke-opacity=".34"/>
  </g>
</svg>
